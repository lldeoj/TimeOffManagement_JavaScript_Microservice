codecov:
  precision: 2
  round: down
  range: "70...100"

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 75
        threshold: 5
      publisher-api:
        target: 80
      consumer-service:
        target: 75
    patch:
      default:
        target: 70

comment:
  layout: "reach, diff, flags, tree"
  behavior: default
  require_changes: false
  require_base: yes
  require_head: yes
  hide_project_coverage: false
